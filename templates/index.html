<!DOCTYPE html>
<html>
<head>
    <title>DevOps Task Board</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🚀 DevOps Task Board</h1>

<form action="/add" method="POST">

<input
type="text"
name="title"
placeholder="Enter task..."
required>

<button type="submit">
Add Task
</button>

</form>

<ul>

{% for task in tasks %}

<li>

{% if task.completed %}

<s>{{ task.title }}</s>

{% else %}

{{ task.title }}

{% endif %}

<a href="/complete/{{ task.id }}">✅</a>

<a href="/delete/{{ task.id }}">🗑</a>

</li>

{% endfor %}

</ul>

</div>

</body>
</html>
